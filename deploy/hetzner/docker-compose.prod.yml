services:
  proxy:
    image: caddy:2
    container_name: foxdesk-prod-proxy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - foxdesk_prod_caddy_data:/data
      - foxdesk_prod_caddy_config:/config
    environment:
      FOXDESK_DOMAIN: ${FOXDESK_DOMAIN:-app.foxdesk.net}

  app:
    build:
      context: ../..
      dockerfile: docker/prod/Dockerfile
    container_name: foxdesk-prod-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config.php:/var/www/html/config.php:ro
      - foxdesk_prod_uploads:/var/www/html/uploads
      - foxdesk_prod_storage:/var/www/html/storage
      - foxdesk_prod_backups:/var/www/html/backups
    environment:
      FOXDESK_SESSION_DIR: storage/sessions
    command: >
      sh -lc "mkdir -p /var/www/html/uploads /var/www/html/storage/sessions /var/www/html/backups
      && chown -R www-data:www-data /var/www/html/uploads /var/www/html/storage /var/www/html/backups
      && apache2-foreground"

  db:
    image: mariadb:11
    container_name: foxdesk-prod-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME:-foxdesk_prod}
      MARIADB_USER: ${DB_USER:-foxdesk}
      MARIADB_PASSWORD: ${DB_PASS}
    volumes:
      - foxdesk_prod_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MARIADB_ROOT_PASSWORD}", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  foxdesk_prod_db:
  foxdesk_prod_uploads:
  foxdesk_prod_storage:
  foxdesk_prod_backups:
  foxdesk_prod_caddy_data:
  foxdesk_prod_caddy_config:
