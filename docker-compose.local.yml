services:
  app:
    build:
      context: .
      dockerfile: docker/local/Dockerfile
    container_name: foxdesk-saas-local-app
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "${FOXDESK_LOCAL_PORT:-8090}:80"
    volumes:
      - ./:/var/www/html
      - foxdesk_saas_uploads:/var/www/html/uploads
      - foxdesk_saas_storage:/var/www/html/storage
      - foxdesk_saas_backups:/var/www/html/backups
    environment:
      FOXDESK_EDITION: saas
      FOXDESK_SESSION_DIR: storage/sessions
      MAIL_PROVIDER: smtp
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_ENCRYPTION: none
      SMTP_FROM_EMAIL: notifications@foxdesk.local
      SMTP_FROM_NAME: FoxDesk Local
      FOXDESK_CLOUDFLARE_EMAIL_INGEST_ENABLED: "1"
      FOXDESK_TICKET_EMAIL_DOMAIN: foxdesk.net
      FOXDESK_TICKET_EMAIL_LOCAL_PART: tickets
    command: >
      sh -lc "mkdir -p /var/www/html/uploads /var/www/html/storage/sessions /var/www/html/backups
      && chown -R www-data:www-data /var/www/html/uploads /var/www/html/storage /var/www/html/backups
      && apache2-foreground"

  db:
    image: mariadb:11
    container_name: foxdesk-saas-local-db
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: foxdesk_saas
      MARIADB_USER: foxdesk
      MARIADB_PASSWORD: foxpass
    ports:
      - "${FOXDESK_LOCAL_DB_PORT:-3307}:3306"
    volumes:
      - foxdesk_saas_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass", "--silent"]
      interval: 2s
      timeout: 5s
      retries: 30

  mailpit:
    image: axllent/mailpit:latest
    container_name: foxdesk-saas-local-mailpit
    ports:
      - "${FOXDESK_LOCAL_MAILPIT_PORT:-8025}:8025"
      - "${FOXDESK_LOCAL_SMTP_PORT:-1025}:1025"

volumes:
  foxdesk_saas_db:
  foxdesk_saas_uploads:
  foxdesk_saas_storage:
  foxdesk_saas_backups:
